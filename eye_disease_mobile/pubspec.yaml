name: eye_disease_mobile
description: Aplicación móvil para el diagnóstico de enfermedades oculares utilizando IA.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  image_picker: ^1.0.4
  fl_chart: ^0.65.0
  google_fonts: ^6.1.0
  camera: ^0.10.5+2
  path_provider: ^2.1.1
  path: ^1.8.3
  onnxruntime: ^1.4.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image: ^4.1.3
  http: ^1.1.0
  shared_preferences: ^2.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/resnet50_quant.onnx
    - assets/models/yolov8_quant.onnx
